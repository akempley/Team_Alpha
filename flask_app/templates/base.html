<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Team Alpha{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
{% block header %}
<nav style="padding: 10px; background-color: #eee;">
    <a href="/">Home</a>

    <!-- Search bar in navigation -->
    <form action="/search" method="get" style="display:inline; margin-left:20px;">
        <input type="text" name="q" placeholder="Search..." required>
        <button type="submit">Search</button>
    </form>
</nav>
{% endblock %}
<hr>

{% block content %}
{% endblock %}
<footer style="text-align: center; padding: 1rem; margin-top: 2rem; border-top: 1px solid #ccc; font-size: 0.9rem;">
    <p>
        <a href="https://www.themoviedb.org/" target="_blank">
            <img src="https://www.themoviedb.org/assets/2/v4/logos/v2/blue_square_2-d537fb228cf3ded904ef09b136fe3fec72548ebc1fea3fbbd1ad9e36364db38b.svg" 
                 alt="TMDB Logo" style="height: 20px; vertical-align: middle; margin-right: 0.5rem;">
        </a>
        This website uses TMDB and the TMDB APIs but is not endorsed, certified, or otherwise approved by TMDB.
    </p>
</footer>

</body>
</html>
